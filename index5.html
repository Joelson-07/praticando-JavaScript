<body>
<script>
let nota=parseInt(prompt("digite sua nota de (0/10): "));
if(nota>=9){
    alert("aprovado com louvor!!!");
} else if (nota>=7){
    alert("aprovado!!!");
}else if (nota>=5){

}else{
    alert("reprovado");
}


</script>

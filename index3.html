<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Praticando js</title>
    <link rel='stylesheet' href='main.js'>
</head>
<body>
    <script>
let a=parseInt(prompt("digite um número: "));
let b=parseInt(prompt("digite outro número: "));
if(a>b){
    alert("o número "+ a +" é maior");
}else if(b>a){
    alert("o número "+ b +" é maior");
}else{
    alert("são iguais");
}

    </script>
</body>
